name: WeirdHost Auto Renew
on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间 8 点运行
  workflow_dispatch:

jobs:
  run-renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install playwright-extra puppeteer-extra-plugin-stealth axios
          # 安装 Google Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # 补全 Playwright 运行依赖
          npx playwright install-deps chromium

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node renew.js
