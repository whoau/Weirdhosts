name: Auto Renew Weirdhost

on:
  schedule:
    # 北京时间 12:00 (中午) = UTC 04:00
    - cron: '0 4 * * *'
    # 建议：增加一次运行以防万一 (例如北京时间 00:00 = UTC 16:00)
    # - cron: '0 4,16 * * *'
  workflow_dispatch:       # 允许手动按钮触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # 授予写入仓库的权限，用于更新 README
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          # 安装 xvfb 和中日韩字体(防止乱码)
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-noto-cjk
          npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Renew Script
        env:
          # 从 GitHub Secrets 读取配置
          REMEMBER_WEB_COOKIE: ${{ secrets.REMEMBER_WEB_COOKIE }}
          PTERODACTYL_SESSION: ${{ secrets.PTERODACTYL_SESSION }}
          WEIRDHOST_EMAIL: ${{ secrets.WEIRDHOST_EMAIL }}
          WEIRDHOST_PASSWORD: ${{ secrets.WEIRDHOST_PASSWORD }}
          WEIRDHOST_SERVER_URLS: ${{ secrets.WEIRDHOST_SERVER_URLS }}
          
          # 设置无头模式为 false (配合下面的 xvfb)
          HEADLESS: 'false'
          DISPLAY: ':99'
        run: |
          # 启动虚拟显示器
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          # 运行 Node.js 脚本
          npm run renew

      - name: Commit & Push README
        # 即使脚本失败也要提交 README (记录失败状态)
        if: always()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查 README.md 是否有变动
          if [[ -n $(git status -s README.md) ]]; then
            git add README.md
            git commit -m "📝 Update renewal status $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "README.md updated and pushed."
          else
            echo "No changes to README.md."
          fi

      - name: Package Screenshots
        if: always()
        run: |
          if [ -d screenshots ] && [ "$(ls -A screenshots)" ]; then
            zip -r screenshots.zip screenshots
          fi

      - name: Upload Screenshot Artifacts
        # 始终尝试上传截图，若不存在则忽略，保留3天
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-screenshots
          path: |
            screenshots/
            screenshots.zip
          retention-days: 3
          if-no-files-found: ignore
